name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR so pushes don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Used by both the CI and deploy jobs — single source of truth.
  REGISTRY: ghcr.io
  NEXTJS_IMAGE:  ghcr.io/pawarharish04/tribe-backend/nextjs
  SOCKETIO_IMAGE: ghcr.io/pawarharish04/tribe-backend/socketio

# ─── Job 1: CI ────────────────────────────────────────────────────────────────
jobs:
  ci:
    name: Type-check · Lint · Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tribe-backend   # all steps run inside the subdir

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tribe-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # tsc --noEmit is already implied by tsconfig "noEmit": true,
      # but we run it explicitly so type errors surface as CI failures.
      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint -- --max-warnings 0

      - name: Jest tests
        run: npm test -- --ci --passWithNoTests
        env:
          # Stub secrets so modules that validate env at import time
          # (src/lib/env.ts) don't throw during test runs.
          DATABASE_URL: postgresql://user:pass@localhost:5432/test
          JWT_SECRET: ci-test-secret-not-used-in-production
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          UPSTASH_REDIS_REST_URL: https://test.upstash.io
          UPSTASH_REDIS_REST_TOKEN: test

# ─── Job 2: Deploy (main only) ────────────────────────────────────────────────
  deploy:
    name: Build & Push Docker images → GHCR
    runs-on: ubuntu-latest
    needs: ci                              # only runs if CI passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Buildx gives us layer caching and multi-platform support.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Next.js image ──────────────────────────────────────────────────────
      - name: Extract metadata (Next.js)
        id: meta-nextjs
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NEXTJS_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Build & push Next.js image
        uses: docker/build-push-action@v5
        with:
          context: ./tribe-backend
          file:    ./tribe-backend/Dockerfile
          push:    true
          tags:    ${{ steps.meta-nextjs.outputs.tags }}
          labels:  ${{ steps.meta-nextjs.outputs.labels }}
          build-args: |
            CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Socket.IO image ────────────────────────────────────────────────────
      - name: Extract metadata (Socket.IO)
        id: meta-socketio
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SOCKETIO_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Build & push Socket.IO image
        uses: docker/build-push-action@v5
        with:
          context: ./tribe-backend
          file:    ./tribe-backend/Dockerfile.socket
          push:    true
          tags:    ${{ steps.meta-socketio.outputs.tags }}
          labels:  ${{ steps.meta-socketio.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
